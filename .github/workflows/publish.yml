name: Build & Publish Terra Addon to Repsy

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all platforms
        run: chmod +x ./gradlew && ./gradlew build

      - name: Publish Terra addon to Repsy
        run: ./gradlew :terra-addon:publish
        env:
          REPSY_USERNAME: ${{ secrets.REPSY_USERNAME }}
          REPSY_PASSWORD: ${{ secrets.REPSY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BubblesOnChunkGen-Jars
          path: |
            bukkit/build/libs/BubblesOnChunkGen-Bukkit-*.jar
            forge/build/libs/BubblesOnChunkGen-Forge-*.jar
            fabric/build/libs/BubblesOnChunkGen-Fabric-*.jar
            terra-addon/build/libs/BubblesOnChunkGen-TerraAddon-*.jar
